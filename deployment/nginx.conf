# Nginx Configuration tailored for Next.js App
# Path: /etc/nginx/sites-available/emotionwire

server {
    listen 80;
    listen [::]:80;
    
    # Replace the ___ with your actual public IP or Domain Name
    server_name emotionwire.com www.emotionwire.com;

    # Increase payload limits depending on need
    client_max_body_size 50M;

    location / {
        # Proxy traffic to Next.js running on Port 3000 via PM2
        proxy_pass http://localhost:3000;
        proxy_http_version 1.1;
        
        # Websocket support (Needed for dev server, optional for standard next paths)
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        
        # Standard proxy headers
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        
        # Caching bypassing so NGINX doesn't stall Next.js internal cache
        proxy_cache_bypass $http_upgrade;
    }

    # Optional: Serve Next.js static assets directly via NGINX for extreme performance speedup
    # location /_next/static/ {
    #     alias /path/to/emotionwire-website/.next/static/;
    #     expires 365d;
    #     access_log off;
    # }
}
